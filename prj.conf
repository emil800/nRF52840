# Logging
CONFIG_LOG=y

# LED strip driver (I2S backend — precise WS2812B timing)
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_I2S=y

# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Bike_LED"

# Shorter range (~few m) and slightly lower current; SoftDevice uses antenna dBm here.
# If the link gets flaky, try -4 or 0 instead.
CONFIG_BT_CTLR_TX_PWR_ANTENNA=-16

# SoC sleeps between BLE / kernel events (radio still wakes for adv & connection)
CONFIG_PM=y
CONFIG_PM_POLICY_DEFAULT=y
