# LED strip driver (I2S backend — precise WS2812B timing)
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_I2S=y

# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Bike_LED"

# Shorter range (~few m) and slightly lower current; SoftDevice uses antenna dBm here.
CONFIG_BT_CTLR_TX_PWR_ANTENNA=-16

# ADC for batter monitoring
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y

# USB serial console (CDC ACM)
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_USB_DEVICE_STACK=n
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y
CONFIG_PRINTK=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
